<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Capa &amp; Co Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700&family=Heebo:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="login-page">
        <form class="login-card" method="POST" action="/login">
            <div class="login-title">קאפה ושות׳</div>
            <div class="login-subtitle">Dashboard Login</div>
            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}
            <input type="password" name="password" class="login-input" placeholder="Password" autofocus required>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
    </div>
</body>
</html>
