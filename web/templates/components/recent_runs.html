{% if recent_runs %}
<table>
    <thead>
        <tr>
            <th>Time</th>
            <th>Task</th>
            <th>Status</th>
            <th>Duration</th>
        </tr>
    </thead>
    <tbody>
    {% for run in recent_runs %}
        <tr class="run-row" onclick="this.classList.toggle('expanded')">
            <td class="text-sm">{{ (run.started_at or '')[:16] }}</td>
            <td class="text-sm">{{ run.task_type }}</td>
            <td><span class="badge badge-{{ run.status }}">{{ run.status }}</span></td>
            <td class="text-sm text-muted">{{ "%.1f" | format(run.duration_seconds or 0) }}s</td>
        </tr>
        <tr class="run-detail">
            <td colspan="4">{{ run.detail or '(no detail)' }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<div class="empty-state">
    <div class="empty-state-text">No runs recorded yet</div>
</div>
{% endif %}
