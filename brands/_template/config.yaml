# Brand Configuration Template
# Copy this directory to brands/<your-brand-slug>/ and fill in your values.
# Then run: python main.py --brand <your-brand-slug> content

identity:
  name: ""                    # Brand name in primary language (e.g. "My Bakery")
  name_en: ""                 # Brand name in English
  language: "en"              # Content language code (en, he, ar, es, etc.)
  timezone: "UTC"             # IANA timezone (e.g. "America/New_York", "Asia/Jerusalem")
  market: ""                  # Target market/country (e.g. "United States", "Israel")
  business_type: ""           # What you do (e.g. "B2B sandwich supplier", "artisan bakery")
  target_audience: ""         # Who you serve (e.g. "food trucks, coffee shops")

voice:
  tone: ""                    # Describe your brand's tone of voice
  caption_style: ""           # Rules for writing captions (language, length, emoji usage)
  caption_examples:           # 2-3 example captions in YOUR tone
    - ""
    - ""
  bad_caption_examples:       # 2-3 examples of what NOT to write
    - ""
  hashtags_default:           # Default hashtags to include
    - ""

visual:
  style_description: ""       # Describe your visual identity
  image_base_prompt: ""       # Base prompt for AI image generation (photography style)
  image_negative_prompt: ""   # What to avoid in generated images
  bg_objects:                 # Props/objects for image backgrounds
    - ""
  bg_colors:                  # Color tones for image backgrounds
    - ""
  color_palette:              # Brand colors (hex codes)
    primary: "#000000"
    secondary: "#666666"

content_strategy:
  weekly_feed_posts: 5        # Feed posts per week
  weekly_stories: 7           # Stories per week
  max_posts_per_day: 1        # Max feed posts published per day
  max_stories_per_day: 2      # Max stories published per day
  content_pillars:            # Content categories to rotate through
    - product
    - behind_scenes
    - customer_spotlight
  feed_post_times: ["07:00", "12:00"]
  story_time: "09:00"
  texture_breakers_per_week: 2

schedule:
  planning_day: "mon"         # Day of week for content planning (mon, tue, etc.)
  culinary_review_hour: 6
  culinary_review_minute: 30
  planning_hour: 7
  design_review_hour: 8
  image_generation_hour: 9
  publish_hours: "6,8,10,12,14,16,18,20"
  analytics_hour: 18
  content_review_hour: 19
  engagement_days: "tue,thu"
  engagement_hour: 10
  lead_gen_day: "wed"
  lead_gen_hour: 10
  token_refresh_days: 50
  health_check_minutes: 30

lead_generation:
  target_customers:           # Types of businesses you want as customers
    - ""
  search_cities:              # Cities to search for leads
    - ""

seasonal_calendar:
  winter: ""                  # What content works in winter
  spring: ""                  # What content works in spring
  summer: ""                  # What content works in summer
  fall: ""                    # What content works in fall
  weekly_rhythm: ""           # Weekly patterns (e.g. prep days, busy days)
