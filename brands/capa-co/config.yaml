# Brand Configuration for Capa & Co
# This file defines all brand-specific identity, voice, visual style, and scheduling.

identity:
  name: "קאפה ושות׳"
  name_en: "Capa & Co"
  language: "he"
  timezone: "Asia/Jerusalem"
  market: "Israel"
  business_type: "B2B sandwich supplier"
  target_audience: "food trucks, coffee shops, small restaurants in Israel"

voice:
  tone: >
    Premium but approachable. Professional but warm. Like a trusted business partner,
    not a corporate vendor. Write like a real person running a bakery — short, playful,
    warm, with personality.
  caption_style: >
    ALL captions MUST be in native Israeli Hebrew. Not translated. Not corporate. Not formal.
    One-liner captions are BEST. Max 2 short sentences. Less is more.
    Emojis: use sparingly, max one, only if natural.
    Add 3-5 hashtags at the end, mix Hebrew and English.
  caption_examples:
    - 'Butter Croissant: "אפשר להריח את החמאה דרך הטלפון :) #קאפהאנדקו #croissant #בייקרי"'
    - 'Grilled Halloumi: "כריך שהוא מעט יווני והמון ישראלי #קאפהאנדקו #halloumi #כריכים"'
    - 'Smoked Salmon: "קלאסיקה שקשה לעמוד בפניה, עם אקסטרה אהבה של קאפה אנד קו בפנים #סלמון #קאפהאנדקו #freshfood"'
  bad_caption_examples:
    - '"בוקר טוב! הכריכים שלנו מוכנים למחר, עם מצרכים טריים ואיכותיים" — too generic, corporate'
    - '"גאווה גדולה לספק ללקוחותינו המיוחדים!" — sounds translated, stiff'
    - '"טיפ לעסקי מזון: חשוב להתאים את התפריט" — no one talks like this'
  hashtags_default:
    - "#קאפהאנדקו"

visual:
  style_description: >
    Minimal, earthy, boutique-feel. Specialty coffee branding meets artisan food.
    Earthy, warm tones (greens, browns, creams) — never cold blues or neon.
    Clean, minimal compositions with generous whitespace.
    Natural textures (wood, marble, linen, fresh ingredients).
    Photography: natural daylight, shallow depth of field, warm color grading.
  image_base_prompt: >
    Photorealistic RAW photo, soft natural morning daylight from the left,
    warm ivory/cream/sand palette, matte ceramic props, clean negative space,
    premium artisanal bakery styling
  image_negative_prompt: >
    text, typography, logo, watermark, menu text, busy cafe interior, crowded table,
    too many props, oversaturated colors, plastic CGI texture, duplicated ingredients,
    deformed bread, broken anatomy, weird hands, fake steam, extreme blur,
    messy sauce splashes, low resolution, cartoon look
