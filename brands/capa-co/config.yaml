    - "Jerusalem"
    - "Haifa"
    - "Be'er Sheva"
    - "Herzliya"
    - "Ra'anana"
    - "Netanya"

seasonal_calendar:
  winter: "comfort food, soups, shakshuka, pastries, warm drinks, Hanukkah foods"
  spring: "light salads, Passover specials, fresh herbs, picnic foods"
  summer: "cold sandwiches, iced drinks, grilled items, light and fresh"
  fall: "Rosh Hashana sweets, honey-based items, back-to-routine lunch specials"
  weekly_rhythm: "challah/Shabbat prep on Thursday-Friday, fresh start on Sunday"
