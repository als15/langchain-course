content_strategy:
  weekly_feed_posts: 5
  weekly_stories: 7
  max_posts_per_day: 1
  max_stories_per_day: 2
  content_pillars:
    - product
    - behind_scenes
    - customer_spotlight
    - industry_tips
    - social_proof
  feed_post_times: ["07:00", "12:00"]
  story_time: "09:00"
  texture_breakers_per_week: 2

schedule:
  planning_day: "sun"
  culinary_review_hour: 6
  culinary_review_minute: 30
  planning_hour: 7
  design_review_hour: 8
  image_generation_hour: 9
  publish_hours: "6,8,10,12,14,16,18,20"
  analytics_hour: 18
  content_review_hour: 19
  engagement_days: "tue,thu"
  engagement_hour: 10
  lead_gen_day: "wed"
  lead_gen_hour: 10
  token_refresh_days: 50
  health_check_minutes: 30

lead_generation:
  target_customers:
